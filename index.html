<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game — v1.0.24</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <header class="game-header">
            <h1 id="game-title">🐍 Snake Game</h1>
            <p id="game-subtitle">A classic arcade experience</p>
        </header>
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">Score</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">High Score</span>
                <span class="score-value" id="high-score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Level</span>
                <span class="score-value" id="level">1</span>
            </div>
            <!-- [SCOREBOARD_MARKER] -->
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls-info">
            <p id="instructions">Use arrow keys or WASD to move</p>
            <button id="startBtn" onclick="startGame()">Start Game</button>
            <button id="pauseBtn" onclick="togglePause()" style="display:none;">Pause</button>
            <!-- [CONTROLS_MARKER] -->
        </div>
        <footer class="game-footer">
            <p id="footer-text">Built with ❤️ | Version 1.0.0</p>
        </footer>
    </div>
    <script src="config.js"></script>
    <script src="game.js"></script>
</body>
</html>
